name: Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].*'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build-release:
    name: Build Release (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: ci-gate
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            use-cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        id: setup
        uses: ./.github/actions/setup-rust-env
        with:
          targets: ${{ matrix.target }}
          cache-prefix: release-${{ matrix.target }}
          install-cross: ${{ matrix.use-cross }}

      - name: Build (native)
        if: ${{ !matrix.use-cross }}
        run: cargo build --release --workspace

      - name: Build (cross)
        if: ${{ matrix.use-cross }}
        run: cross build --release --target ${{ matrix.target }} --workspace

      - name: Package release
        run: |
          VERSION="${{ steps.setup.outputs.project-version }}"
          RELEASE_DIR="rasa-${VERSION}-linux-${{ matrix.arch }}"
          mkdir -p "${RELEASE_DIR}"

          if [ "${{ matrix.use-cross }}" = "true" ]; then
            BIN_DIR="target/${{ matrix.target }}/release"
          else
            BIN_DIR="target/release"
          fi

          cp "${BIN_DIR}/rasa-mcp" "${RELEASE_DIR}/"
          cp README.md "${RELEASE_DIR}/"
          cp config/rasa.example.toml "${RELEASE_DIR}/"

          tar czf "${RELEASE_DIR}.tar.gz" "${RELEASE_DIR}"
          sha256sum "${RELEASE_DIR}.tar.gz" > "${RELEASE_DIR}.tar.gz.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: |
            rasa-*.tar.gz
            rasa-*.tar.gz.sha256
          retention-days: 7

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: sbom

      - name: Install SBOM tools
        run: |
          cargo install cargo-cyclonedx --locked
          cargo install cargo-license --locked

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --format json --override-filename rasa-sbom
          cargo cyclonedx --format xml --override-filename rasa-sbom
          mkdir -p sbom-out
          find . -name 'rasa-sbom*' -not -path './sbom-out/*' -exec cp {} sbom-out/ \;

      - name: Generate license report
        run: |
          cargo license --json > sbom-out/rasa-licenses.json
          cargo license > sbom-out/rasa-licenses.txt

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-out/
          retention-days: 90

  checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: [build-release]
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate combined SHA256SUMS
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec sha256sum {} \; | sed 's|  \./[^/]*/|  |' > SHA256SUMS
          cat SHA256SUMS

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/SHA256SUMS
          retention-days: 7

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, generate-sbom, checksums]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          RAW=$(cat VERSION)
          echo "version=${RAW}" >> "$GITHUB_OUTPUT"
          IFS='.-' read -r YEAR MONTH DAY PATCH <<< "$RAW"
          BUILD=$(printf "%04d%02d%02d%s" "$YEAR" "$MONTH" "$DAY" "${PATCH:-}")
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          TAG_COUNT=$(git tag --sort=-version:refname | wc -l)
          if [ "$TAG_COUNT" -ge 2 ]; then
            PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
            CHANGELOG=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          else
            CHANGELOG=$(git log --oneline --no-decorate)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Rasa ${{ steps.version.outputs.version }}
          body: |
            ## Rasa ${{ steps.version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Downloads
            | Platform | Archive |
            |----------|---------|
            | Linux amd64 | `rasa-${{ steps.version.outputs.version }}-linux-amd64.tar.gz` |
            | Linux arm64 | `rasa-${{ steps.version.outputs.version }}-linux-arm64.tar.gz` |

            ### Container
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ```

            ### Verification
            Each archive includes a `.sha256` checksum file.
            A combined `SHA256SUMS` file is also attached.
          files: |
            release-artifacts/release-amd64/*
            release-artifacts/release-arm64/*
            release-artifacts/sbom/*
            release-artifacts/checksums/*
          prerelease: false

  container:
    name: Publish Container
    runs-on: ubuntu-latest
    needs: [ci-gate, build-release]
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          RAW=$(cat VERSION)
          echo "version=${RAW}" >> "$GITHUB_OUTPUT"
          IFS='.-' read -r YEAR MONTH DAY PATCH <<< "$RAW"
          BUILD=$(printf "%04d%02d%02d%s" "$YEAR" "$MONTH" "$DAY" "${PATCH:-}")
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.build }}
            ghcr.io/${{ steps.version.outputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
